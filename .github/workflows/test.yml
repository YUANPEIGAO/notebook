name: Test Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: List files
      run: ls -la
    - name: Check for HTML files
      run: find . -name "*.html" | head -20
    - name: Check for JavaScript files
      run: find . -name "*.js" | head -20